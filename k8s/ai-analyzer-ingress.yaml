apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-analyzer
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # Publicar solo endpoints propios del analyzer para no interceptar
          # rutas del portal cautivo como /api/register/client|guest.
          - path: /api/history
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/stats
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/queue
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/stream
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/ingest
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/policy
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/rulez
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/prompt-logs
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/domain-stats
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/explanations
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/alerts
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/domain-categories
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/summaries
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/reports
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/devices
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /api/portal/risk-message
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /terminal
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /rulez
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /reports
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
