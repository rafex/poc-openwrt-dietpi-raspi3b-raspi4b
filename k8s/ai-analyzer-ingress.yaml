apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-analyzer
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: ai-analyzer
                port:
                  number: 5000
