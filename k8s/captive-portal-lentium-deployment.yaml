apiVersion: apps/v1
kind: Deployment
metadata:
  name: captive-portal-lentium
  namespace: default
  annotations:
    portal-variant: lentium
    portal-description: "Portal Lentium con registro de clientes e invitados"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: captive-portal
      portal-variant: lentium
  template:
    metadata:
      labels:
        app: captive-portal
        portal-variant: lentium
    spec:
      containers:
        # --- nginx: redirecciones captive + real_ip + proxy al backend ---
        - name: portal
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: ssh-keys
              mountPath: /opt/keys
              readOnly: true

        # --- Backend Lentium: registro SQLite + autorización nftables ---
        - name: backend
          image: localhost/captive-backend-lentium:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ROUTER_IP
              value: "192.168.1.1"
            - name: ROUTER_USER
              value: "root"
            - name: SSH_KEY
              value: "/opt/keys/captive-portal"
            - name: PORTAL_IP
              value: "192.168.1.167"
            - name: DB_PATH
              value: "/data/lentium.db"
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: ssh-keys
              mountPath: /opt/keys
              readOnly: true
            - name: lentium-data
              mountPath: /data

      volumes:
        - name: nginx-conf
          configMap:
            name: captive-portal-lentium-nginx-conf
        - name: ssh-keys
          hostPath:
            path: /opt/keys
            type: Directory
        - name: lentium-data
          emptyDir: {}
