apiVersion: apps/v1
kind: Deployment
metadata:
  name: captive-portal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: captive-portal
  template:
    metadata:
      labels:
        app: captive-portal
    spec:
      containers:
      - name: portal
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: portal-html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: portal-html
        configMap:
          name: captive-portal-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: captive-portal-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>Portal RafexPi</title></head>
    <body>
      <h1>Bienvenido a la red WiFi demo</h1>
      <p>Esta red es una demostración educativa de seguridad.</p>
    </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: captive-portal
  namespace: default
spec:
  selector:
    app: captive-portal
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: captive-portal
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: captive-portal
            port:
              number: 80
