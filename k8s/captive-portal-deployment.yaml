apiVersion: apps/v1
kind: Deployment
metadata:
  name: captive-portal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: captive-portal
  template:
    metadata:
      labels:
        app: captive-portal
    spec:
      containers:
      - name: portal
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-conf
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        - name: nginx-conf
          mountPath: /usr/share/nginx/html/accepted.html
          subPath: accepted.html
      volumes:
      - name: nginx-conf
        configMap:
          name: captive-portal-nginx-conf
