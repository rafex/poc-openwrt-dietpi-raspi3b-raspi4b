apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analyzer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-analyzer
  template:
    metadata:
      labels:
        app: ai-analyzer
    spec:
      containers:
        - name: analyzer
          image: localhost/ai-analyzer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: MQTT_HOST
              value: "192.168.1.167"
            - name: MQTT_PORT
              value: "1883"
            - name: MQTT_TOPIC
              value: "rafexpi/sensor/batch"
            - name: DB_PATH
              value: "/data/sensor.db"
            - name: LLAMA_URL
              value: "http://192.168.1.167:8081"
            - name: MODEL_FORMAT
              value: "tinyllama"
            - name: N_PREDICT
              value: "256"
            - name: PORT
              value: "5000"
            - name: LOG_LEVEL
              value: "INFO"
            - name: ROUTER_IP
              value: "192.168.1.1"
            - name: ROUTER_USER
              value: "root"
            - name: SSH_KEY
              value: "/opt/keys/captive-portal"
            - name: SOCIAL_BLOCK_ENABLED
              value: "true"
            - name: SOCIAL_POLICY_START_HOUR
              value: "9"
            - name: SOCIAL_POLICY_END_HOUR
              value: "17"
            - name: SOCIAL_POLICY_TZ
              value: "America/Mexico_City"
            - name: SOCIAL_MIN_HITS
              value: "3"
          volumeMounts:
            - name: analyzer-data
              mountPath: /data
            - name: ssh-keys
              mountPath: /opt/keys
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: analyzer-data
          hostPath:
            path: /opt/analyzer/data
            type: DirectoryOrCreate
        - name: ssh-keys
          hostPath:
            path: /opt/keys
            type: Directory
