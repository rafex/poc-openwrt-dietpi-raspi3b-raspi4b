apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analyzer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-analyzer
  template:
    metadata:
      labels:
        app: ai-analyzer
    spec:
      containers:
        - name: analyzer
          image: localhost/ai-analyzer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: MQTT_HOST
              value: "192.168.1.167"
            - name: MQTT_PORT
              value: "1883"
            - name: MQTT_TOPIC
              value: "rafexpi/sensor/batch"
            - name: DB_PATH
              value: "/data/sensor.db"
            - name: LLAMA_URL
              value: "http://192.168.1.167:8081"
            - name: N_PREDICT
              value: "384"
            - name: PORT
              value: "5000"
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: analyzer-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: analyzer-data
          hostPath:
            path: /opt/analyzer/data
            type: DirectoryOrCreate
