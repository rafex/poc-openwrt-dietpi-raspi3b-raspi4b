apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analyzer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-analyzer
  template:
    metadata:
      labels:
        app: ai-analyzer
    spec:
      containers:
        - name: analyzer
          image: localhost/ai-analyzer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: LLAMA_URL
              value: "http://192.168.1.167:8081"
            - name: LLAMA_MODEL
              value: "tinyllama"
            - name: HISTORY_SIZE
              value: "100"
            - name: PORT
              value: "5000"
            - name: N_PREDICT
              value: "384"
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
