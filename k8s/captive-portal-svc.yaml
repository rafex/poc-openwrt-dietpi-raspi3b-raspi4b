apiVersion: v1
kind: Service
metadata:
  name: captive-portal
  namespace: default
  annotations:
    # El script portal-switch.sh modifica el selector portal-variant en runtime.
    # Valor inicial: lentium (portal principal).
    active-portal: lentium
spec:
  selector:
    app: captive-portal
    portal-variant: lentium
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: backend
      port: 8080
      targetPort: 8080
