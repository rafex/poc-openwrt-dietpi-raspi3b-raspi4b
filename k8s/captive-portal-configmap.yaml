apiVersion: v1
kind: ConfigMap
metadata:
  name: captive-portal-nginx-conf
  namespace: default
data:
  default.conf: |
    # Formato de log detallado: IP real, método, ruta, status, bytes, tiempo, headers clave
    log_format captive '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time xff="$http_x_forwarded_for" xrip="$http_x_real_ip"';

    server {
        listen 80 default_server;
        server_name _;

        # Log de acceso con formato detallado — todo va a stdout para kubectl logs
        access_log /dev/stdout captive;
        error_log  /dev/stderr warn;

        # --- Confiar en headers de Traefik ---
        # Traefik envía X-Forwarded-For con la IP real del cliente WiFi.
        # real_ip_from: confiar en requests que vengan de la red k3s (Traefik).
        # Después de esto, $remote_addr = IP real del cliente (192.168.1.X).
        set_real_ip_from 10.42.0.0/16;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # --- Detección de captive portal por SO ---
        # iOS / macOS
        location /hotspot-detect.html {
            return 302 http://192.168.1.167/portal;
        }
        # Android
        location /generate_204 {
            return 302 http://192.168.1.167/portal;
        }
        # Windows
        location /connecttest.txt {
            return 302 http://192.168.1.167/portal;
        }
        # Firefox
        location /success.txt {
            return 302 http://192.168.1.167/portal;
        }

        # --- Portal principal ---
        location /portal {
            default_type text/html;
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location /accepted {
            default_type text/html;
            root /usr/share/nginx/html;
            try_files /accepted.html =404;
        }

        # --- Proxy al backend Python (sidecar en localhost:8080) ---
        # $remote_addr contiene la IP real del cliente (gracias a set_real_ip_from arriba)
        location /accept {
            proxy_pass http://127.0.0.1:8080/accept;
            proxy_set_header X-Real-IP      $remote_addr;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }

        # Redirigir todo lo demás al portal
        location / {
            return 302 http://192.168.1.167/portal;
        }
    }

  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Portal RafexPi - Demo Seguridad</title>
      <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; text-align: center; }
        button { background: #2563eb; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%; }
        button:hover { background: #1d4ed8; }
        .warning { background: #fef3c7; border: 1px solid #f59e0b; padding: 12px; border-radius: 8px; margin: 16px 0; font-size: 14px; }
      </style>
    </head>
    <body>
      <h1>🔒 Red WiFi Demo</h1>
      <p>Esta es una demostración educativa de seguridad en redes públicas con IA.</p>
      <div class="warning">
        ⚠️ Esta red monitorea metadatos de tráfico con fines educativos.
      </div>
      <p>Al continuar, aceptas participar en la demo.</p>
      <button onclick="accept()">Entendido, quiero navegar</button>
      <script>
        function accept() {
          fetch('/accept', { method: 'POST' })
            .then(r => r.json())
            .then(() => window.location.href = '/accepted')
            .catch(() => window.location.href = '/accepted');
        }
      </script>
    </body>
    </html>

  accepted.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Conectado</title>
      <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; text-align: center; }
        .ok { color: #16a34a; font-size: 48px; }
      </style>
    </head>
    <body>
      <div class="ok">✓</div>
      <h2>¡Conectado!</h2>
      <p>Ya puedes navegar libremente.</p>
      <p><a href="https://google.com">Ir a internet</a></p>
    </body>
    </html>
