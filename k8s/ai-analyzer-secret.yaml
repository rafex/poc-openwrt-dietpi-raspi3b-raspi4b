# ai-analyzer-secret.yaml — PLANTILLA de referencia (NO contiene valores reales)
#
# Este archivo NO se aplica directamente con kubectl apply.
# El script setup-raspi4b-ai-analyzer.sh crea el Secret en k3s leyendo
# las variables de entorno del host (GROQ_API_KEY, GROQ_MODEL).
#
# Para crearlo manualmente en el cluster:
#
#   kubectl create secret generic groq-credentials \
#     --from-literal=GROQ_API_KEY="$GROQ_API_KEY" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Para verificar que existe:
#   kubectl get secret groq-credentials
#   kubectl describe secret groq-credentials
#
# Para actualizarlo sin borrar el pod:
#   kubectl create secret generic groq-credentials \
#     --from-literal=GROQ_API_KEY="$GROQ_API_KEY" \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl rollout restart deployment/ai-analyzer
#
# ── Estructura del Secret ──────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: groq-credentials
  namespace: default
type: Opaque
# Las claves van base64-encoded; el script las genera automáticamente.
# NO pongas valores reales aquí — este archivo está en el repositorio.
stringData:
  GROQ_API_KEY: ""   # placeholder — el script sobrescribe esto en runtime
