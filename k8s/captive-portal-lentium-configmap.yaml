apiVersion: v1
kind: ConfigMap
metadata:
  name: captive-portal-lentium-nginx-conf
  namespace: default
data:
  default.conf: |
    log_format captive '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time xff="$http_x_forwarded_for" xrip="$http_x_real_ip"';

    server {
        listen 80 default_server;
        server_name _;

        access_log /dev/stdout captive;
        error_log  /dev/stderr warn;

        set_real_ip_from 10.42.0.0/16;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # --- Detección de captive portal por SO ---
        location /hotspot-detect.html { return 302 http://192.168.1.167/portal; }
        location /generate_204        { return 302 http://192.168.1.167/portal; }
        location /connecttest.txt     { return 302 http://192.168.1.167/portal; }
        location /success.txt         { return 302 http://192.168.1.167/portal; }

        # --- Portal Lentium: todo va al backend Python que sirve el HTML ---
        location /portal {
            proxy_pass http://127.0.0.1:8080/;
            proxy_set_header X-Real-IP      $remote_addr;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }

        # --- API de registro e invitados ---
        # Compatibilidad: algunos clientes viejos mandan "/api/register/quest"
        location = /api/register/guest {
            proxy_pass http://127.0.0.1:8080/api/register/guest;
            proxy_set_header X-Real-IP      $remote_addr;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8080/api/;
            proxy_set_header X-Real-IP      $remote_addr;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }

        # --- Compatibilidad con /accept del portal clásico ---
        location /accept {
            proxy_pass http://127.0.0.1:8080/accept;
            proxy_set_header X-Real-IP      $remote_addr;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }

        location /health {
            proxy_pass http://127.0.0.1:8080/health;
        }

        location /people {
            proxy_pass http://127.0.0.1:8080/people;
            proxy_set_header X-Real-IP      $remote_addr;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }

        location /demoDashboard {
            proxy_pass http://127.0.0.1:8080/people;
            proxy_set_header X-Real-IP      $remote_addr;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }

        location /accepted {
            proxy_pass http://127.0.0.1:8080/accepted;
            proxy_set_header X-Real-IP      $remote_addr;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }

        location = / {
            if ($host = people.localhost.com) {
                return 302 http://people.localhost.com/people;
            }
            return 302 http://192.168.1.167/portal;
        }

        location / {
            return 302 http://192.168.1.167/portal;
        }
    }
