apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: dashboard-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: dashboard-conf
              mountPath: /usr/share/nginx/html/dashboard.html
              subPath: dashboard.html
            - name: dashboard-conf
              mountPath: /usr/share/nginx/html/terminal.html
              subPath: terminal.html
      volumes:
        - name: dashboard-conf
          configMap:
            name: dashboard-nginx-conf
