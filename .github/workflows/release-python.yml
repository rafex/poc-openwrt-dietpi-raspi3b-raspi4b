name: Release — ai-analyzer Python (arm64)

# ─────────────────────────────────────────────────────────────────────────────
# Flujo de release para el backend Python:
#   1. Compilar frontend (Pug → HTML + Vite) — el backend Python sirve los HTML
#   2. Construir imagen Docker linux/arm64 (Alpine + Python 3.13)
#   3. Publicar en ghcr.io
#
# El backend Python sirve los HTML directamente (dashboard, chat, terminal…)
# desde su propio directorio. Los HTML los genera el frontend Vite.
#
# Triggers:
#   • push de tag  v*.*.*          →  release producción  + :latest en ghcr.io
#   • push de tag  v*.*.*-preview  →  pre-release (develop) — NO sobreescribe :latest
#   • push a main/develop con cambios en backend/python/**  →  imagen dev-<sha>
#   • workflow_dispatch             →  release manual
#
# Tags de Docker publicados:
#   v0.4.0          →  ghcr.io/…:0.4.0  ghcr.io/…:0.4  ghcr.io/…:latest
#   v0.4.0-preview  →  ghcr.io/…:0.4.0-preview  ghcr.io/…:preview  (sin latest)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-preview'
    branches:
      - main
      - develop
    paths:
      - 'backend/python/ai-analyzer/**'
      - '.github/workflows/release-python.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de versión (ej: v1.2.3 o v1.2.3-preview)'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: read
  packages: write   # publicar en ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/poc-ai-analyzer-python
  NODE_VERSION: '20'

jobs:
  publish-python-image:
    name: "Docker image → ghcr.io (linux/arm64)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # El backend Python sirve los HTML directamente (dashboard, chat, terminal…)
      # Compilar frontend para obtener los HTML con assets Vite embebidos
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Compilar frontend (pug → HTML + Vite)
        working-directory: frontend
        run: |
          npm install --prefer-offline
          npm run build

      - name: Copiar HTML compilados al directorio Python
        run: |
          echo "── Archivos HTML generados por Vite ──"
          ls -lh frontend/dist/*.html
          cp frontend/dist/dashboard.html  backend/python/ai-analyzer/
          cp frontend/dist/chat.html       backend/python/ai-analyzer/
          cp frontend/dist/terminal.html   backend/python/ai-analyzer/
          cp frontend/dist/rulez.html      backend/python/ai-analyzer/
          cp frontend/dist/reports.html    backend/python/ai-analyzer/
          echo "── Contexto Python listo ──"
          ls -lh backend/python/ai-analyzer/*.html

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (para build arm64 en runner x86)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadatos de imagen (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-preview') }}
            type=raw,value=preview,enable=${{ contains(github.ref, '-preview') }}
            type=sha,prefix=dev-
          labels: |
            org.opencontainers.image.title=AI Analyzer Python
            org.opencontainers.image.description=Analizador de red con IA — backend Python 3.13 arm64
            org.opencontainers.image.vendor=Rafex

      - name: Build y push imagen arm64
        uses: docker/build-push-action@v5
        with:
          context: backend/python/ai-analyzer/
          file: backend/python/ai-analyzer/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumen
        run: |
          echo "## Imagen Python publicada" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pull en Pi4B" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "bash scripts/setup-raspi4b-containers.sh --backend=python --release=latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
