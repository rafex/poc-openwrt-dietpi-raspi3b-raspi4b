name: CI — ai-analyzer (Java + Rust)

# ─────────────────────────────────────────────────────────────────────────────
# Verificación rápida en cada push a branch y en cada PR.
#
# Este workflow hace SOLO verificación ligera (compilación JVM + cargo check).
# NO ejecuta GraalVM Native Image ni cargo build --release arm64.
#
# La compilación completa ocurre únicamente en release-java.yml:
#   • Rust cdylib → libanalyzer_db-linux-arm64.so
#   • GraalVM Native Image → ai-analyzer-linux-arm64
#   • GitHub Release con ambos artefactos
#   • Imagen Docker linux/arm64 → ghcr.io
#
# Trigger de release-java.yml: push de tag v*.*.* o v*.*.*-preview
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/java/ai-analyzer/**'
      - 'backend/java/ai-analyzer/db-lib/**'
      - '.github/workflows/build-ai-analyzer.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/java/ai-analyzer/**'
      - 'backend/java/ai-analyzer/db-lib/**'

jobs:
  # ── 1. Verificar compilación Java (JVM normal, sin GraalVM) ───────────────
  #
  # Objetivo: detectar errores de compilación en < 3 min, sin consumir
  # runners ARM64 ni instalar GraalVM. La native image solo se genera
  # en release-java.yml cuando se hace push de tag.
  verify-java:
    name: Verificar compilación Java (host)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Caché Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('backend/java/ai-analyzer/pom.xml') }}
          restore-keys: maven-

      - name: Agregar cabeceras de licencia MIT
        working-directory: backend/java/ai-analyzer
        run: mvn license:update-file-header -q

      - name: Compilar (sin -Pnative, sin libanalyzer_db)
        working-directory: backend/java/ai-analyzer
        run: |
          # -Pnative requiere GraalVM + libanalyzer_db arm64 — solo en release-java.yml.
          # SEARCH_API_TOKEN/GROQ_API_KEY se leen en runtime desde la Pi, no en compilación.
          mvn -q compile -DskipTests

  # ── 2. Verificar crate Rust (cargo check + clippy) ────────────────────────
  #
  # Objetivo: detectar errores de tipos y warnings de Clippy sin compilar
  # el cdylib completo (cargo build --release tarda ~5 min extra).
  verify-rust:
    name: Verificar crate Rust (host)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Caché Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/java/ai-analyzer/db-lib/target
          key: rust-host-${{ hashFiles('backend/java/ai-analyzer/db-lib/Cargo.lock') }}
          restore-keys: rust-host-

      - name: cargo check + clippy
        working-directory: backend/java/ai-analyzer/db-lib
        run: |
          cargo check
          cargo clippy -- -D warnings
