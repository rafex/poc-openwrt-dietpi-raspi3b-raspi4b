# secrets/raspi4b.yaml — Secretos de la Raspi 4B
#
# Este archivo debe estar CIFRADO con sops+age antes de hacer commit.
# Para inicializarlo: bash scripts/secrets-init.sh
# Para editarlo:      bash scripts/secrets-edit.sh
#
# sops cifra los VALORES pero deja las CLAVES visibles en git.
# El resultado cifrado se ve como:
#   GROQ_API_KEY: ENC[AES256_GCM,data:...,type:str]

GROQ_API_KEY: ""
GROQ_MODEL: "qwen/qwen3-32b"
