# nginx/nginx.conf — Servidor unificado: frontend estático + proxy reverso al backend Java
#
# Arquitectura:
#   [Browser]
#       │
#       ▼ :80
#   [nginx] ── /api/*, /health, /events ──▶ [Java ai-analyzer :5000]  (host)
#       │
#       └── /* ──▶ /usr/share/nginx/html/  (Vite dist/)
#
# Deploy (podman con --network=host, recomendado para Pi):
#   podman run -d --name ai-analyzer-web --network=host ai-analyzer-web:latest
#
# Deploy alternativo (bridge, backend accesible en host.containers.internal):
#   podman run -d --name ai-analyzer-web -p 80:80 \
#     --add-host=backend:host-gateway ai-analyzer-web:latest
#   # Y cambiar `proxy_pass http://localhost:5000` por `http://backend:5000`

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compresión ──────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/html text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml font/woff2;

    # ── Assets con hash → cache largo (Vite añade hash al nombre) ────────────
    location ~* \.(js|css|woff2?|png|svg|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Proxy: SSE /events (sin buffering — conexión larga) ──────────────────
    location = /events {
        proxy_pass             http://localhost:5000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       Connection        "";
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
        add_header             Cache-Control "no-store";
        add_header             X-Accel-Buffering "no";
    }

    # ── Proxy: API REST /api/* ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Proxy: /health ────────────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
    }

    # ── Frontend: páginas HTML con URLs limpias ───────────────────────────────
    # try_files intenta: /dashboard → /dashboard.html → 404
    # Así funcionan las URLs sin extensión .html generadas por Vite MPA.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files  $uri $uri.html $uri/ =404;
    }

    # ── Health del propio nginx ───────────────────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
