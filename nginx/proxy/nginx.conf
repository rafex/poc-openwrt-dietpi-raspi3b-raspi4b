# nginx/proxy/nginx.conf
# Variables inyectadas en tiempo de ejecución vía variables de entorno podman:
#   BACKEND_HOST  (default: host.containers.internal)
#   BACKEND_PORT  (default: 5000)
#   FRONTEND_HOST (default: ai-analyzer-frontend)
#   FRONTEND_PORT (default: 3000)

upstream backend {
    server ${BACKEND_HOST}:${BACKEND_PORT};
    keepalive 8;
}

upstream frontend {
    server ${FRONTEND_HOST}:${FRONTEND_PORT};
    keepalive 4;
}

server {
    listen 80;
    server_name _;

    # ── Backend: API REST ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Backend: Health ────────────────────────────────────────────────────
    location /health {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Backend: SSE (sin buffering) ───────────────────────────────────────
    location /events {
        proxy_pass             http://backend;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       Connection        "";
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    # ── Frontend: todo lo demás ────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # Salud del proxy
    location /proxy-ping {
        return 200 "proxy-ok\n";
        add_header Content-Type text/plain;
    }
}
