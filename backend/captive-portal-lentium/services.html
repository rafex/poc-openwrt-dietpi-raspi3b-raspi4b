<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>services · PoC Ops</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b1220;color:#e5edf7}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    h1{margin:0 0 8px}.sub{opacity:.85;margin-bottom:14px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
    .card{background:#132038;border:1px solid #2a3d60;border-radius:10px;padding:12px}
    .title{font-weight:700;margin-bottom:8px}
    .state{font-size:.9rem;margin-bottom:8px}
    .ok{color:#74f0a7}.bad{color:#ffb4b4}.muted{opacity:.75}
    button{margin-right:6px;margin-top:6px;padding:7px 10px;border:0;border-radius:8px;background:#2b6de0;color:#fff;cursor:pointer}
    pre{background:#0a1528;border:1px solid #2a3d60;border-radius:8px;padding:10px;white-space:pre-wrap;max-height:260px;overflow:auto}
  </style>
</head>
<body>
<div class="wrap">
  <h1>services</h1>
  <div class="sub">Operación de servicios de la PoC (LLM, cola, sensor, captive switch).</div>

  <div class="grid" id="cards"></div>

  <div class="card" style="margin-top:12px;">
    <div class="title">Salida de acciones</div>
    <pre id="log" class="muted">Sin acciones aún.</pre>
  </div>
</div>

<script>
const defs = {
  llm: {label:'LLM (llama-server)', actions:['status','on','off','restart']},
  queue: {label:'Cola MQTT (mosquitto)', actions:['status','on','off','restart']},
  sensor: {label:'Sensor Raspi3B', actions:['status','on','off','restart']},
  captive: {label:'Portal Cautivo', actions:['status','lentium','clasico']}
};

function esc(s){ return String(s ?? '').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function setLog(obj){ document.getElementById('log').textContent = JSON.stringify(obj, null, 2); }

async function callAction(service, action){
  const res = await fetch('/api/services/action', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({service, action})
  });
  const data = await res.json();
  setLog(data);
  await refresh();
}

function buildCard(service, st){
  const def = defs[service];
  let statusText = 'desconocido';
  let cls = 'muted';

  if(service === 'captive'){
    statusText = st?.active_portal || 'unknown';
    cls = statusText === 'unknown' ? 'bad' : 'ok';
  } else {
    const active = !!st?.active;
    statusText = active ? 'activo' : 'inactivo';
    cls = active ? 'ok' : 'bad';
  }

  const btns = def.actions.map(a => `<button onclick="callAction('${service}','${a}')">${a}</button>`).join('');
  return `<div class="card">
    <div class="title">${esc(def.label)}</div>
    <div class="state">Estado: <span class="${cls}">${esc(statusText)}</span></div>
    <div>${btns}</div>
  </div>`;
}

async function refresh(){
  const res = await fetch('/api/services/status');
  const data = await res.json();
  const html = ['llm','queue','sensor','captive'].map(s => buildCard(s, data[s])).join('');
  document.getElementById('cards').innerHTML = html;
}

refresh().catch(err => setLog({error:String(err)}));
setInterval(() => refresh().catch(()=>{}), 5000);
</script>
</body>
</html>
