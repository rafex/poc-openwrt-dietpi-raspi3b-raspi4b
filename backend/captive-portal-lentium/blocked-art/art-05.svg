<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1f33"/><stop offset="1" stop-color="#06111d"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="180" cy="120" r="90" fill="#f8961e" opacity="0.22"/>
  <circle cx="1080" cy="580" r="140" fill="#ffd166" opacity="0.20"/>
  <rect x="90" y="80" rx="26" ry="26" width="1100" height="560" fill="#0a1624" opacity="0.52" stroke="#ffffff22"/>
  <text x="640" y="190" text-anchor="middle" font-size="56" fill="#ffffff" font-family="Verdana" font-weight="700">Sitio bloqueado por IA</text>
  <text x="640" y="250" text-anchor="middle" font-size="40" fill="#ffd166" font-family="Verdana" font-weight="700">Sitio arqueológico bloqueado</text>
  <text x="640" y="305" text-anchor="middle" font-size="28" fill="#d8e9ff" font-family="Verdana">La IA encontró fósiles de malware jurásico.</text>

  <!-- Barricade -->
  <rect x="250" y="420" width="780" height="24" fill="#f94144"/>
  <rect x="250" y="456" width="780" height="24" fill="#f8961e"/>
  <rect x="270" y="430" width="30" height="90" fill="#d9d9d9"/>
  <rect x="980" y="430" width="30" height="90" fill="#d9d9d9"/>

  <!-- Tux-ish logo -->
  <ellipse cx="250" cy="540" rx="65" ry="88" fill="#111" filter="url(#shadow)"/>
  <ellipse cx="250" cy="550" rx="42" ry="62" fill="#f5f5f5"/>
  <ellipse cx="230" cy="520" rx="8" ry="10" fill="#fff"/><ellipse cx="270" cy="520" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="230" cy="522" rx="3" ry="4" fill="#000"/><ellipse cx="270" cy="522" rx="3" ry="4" fill="#000"/>
  <polygon points="250,535 236,548 264,548" fill="#f4a261"/>

  <!-- GNU-ish horn mark -->
  <path d="M1010 520 q-35 -40 -70 0 q35 15 50 40 q-10 30 20 42 q35 -10 25 -40 q20 -28 55 -40 q-30 -38 -80 -2z" fill="#f8961e"/>

  <!-- Gear (free software vibe) -->
  <g transform="translate(640,530)">
    <circle r="58" fill="none" stroke="#9ec7ff" stroke-width="18"/>
    <circle r="24" fill="#9ec7ff"/>
    <g stroke="#9ec7ff" stroke-width="12">
      <line x1="0" y1="-84" x2="0" y2="-62"/><line x1="0" y1="84" x2="0" y2="62"/>
      <line x1="84" y1="0" x2="62" y2="0"/><line x1="-84" y1="0" x2="-62" y2="0"/>
      <line x1="59" y1="-59" x2="45" y2="-45"/><line x1="-59" y1="59" x2="-45" y2="45"/>
      <line x1="59" y1="59" x2="45" y2="45"/><line x1="-59" y1="-59" x2="-45" y2="-45"/>
    </g>
  </g>

  <!-- Firefox-ish tail swirl -->
  <path d="M880 560 q-18 -56 30 -96 q34 -28 75 -14 q-26 10 -34 36 q42 15 36 54 q-9 58 -90 61 q-23 -3 -17 -41z" fill="#ff7b00" opacity="0.92"/>

  <text x="640" y="622" text-anchor="middle" font-size="26" fill="#ffffff" font-family="Verdana" font-weight="700">Acceso denegado por política inteligente de red</text>
  <text x="640" y="656" text-anchor="middle" font-size="22" fill="#cfe8ff" font-family="Verdana">Reinicia sesión en el portal para continuar navegando</text>
</svg>
