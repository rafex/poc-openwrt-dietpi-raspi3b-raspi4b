<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Network Reports</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b1220;color:#e5e7eb}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:10px 12px;background:#2563eb;color:#fff;cursor:pointer;font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:12px}
.card h3{margin:0 0 8px;font-size:14px;color:#93c5fd}
pre{white-space:pre-wrap;line-height:1.5;background:#0f172a;border:1px solid #1f2937;border-radius:8px;padding:10px;max-height:60vh;overflow:auto}
.row{padding:8px;border:1px solid #1f2937;border-radius:8px;margin-bottom:8px;background:#0f172a}
.meta{font-size:12px;color:#9ca3af;margin-bottom:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h2>Reportes y Resumenes de Red</h2>
    <button id="gen" class="btn">Generar reporte ahora</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Ultimo resumen automatico</h3>
      <pre id="lastSummary">Cargando...</pre>
    </div>
    <div class="card">
      <h3>Ultimo reporte</h3>
      <pre id="lastReport">Cargando...</pre>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Historial de resumenes</h3>
      <div id="sumList"></div>
    </div>
    <div class="card">
      <h3>Historial de reportes</h3>
      <div id="repList"></div>
    </div>
  </div>
</div>
<script>
function fmt(ts){ try { return new Date(ts).toLocaleString('es-MX'); } catch(e) { return ts || ''; } }
function renderList(el, items, field){
  if (!items || !items.length) { el.innerHTML = '<div class="row">Sin datos</div>'; return; }
  el.innerHTML = items.slice().reverse().slice(0, 20).map(function(it){
    return '<div class="row"><div class="meta">' + fmt(it.timestamp) + '</div><div>' + (it[field] || '') + '</div></div>';
  }).join('');
}
async function refresh(){
  const [s, r] = await Promise.all([
    fetch('/api/summaries/latest?limit=30').then(x => x.json()),
    fetch('/api/reports/latest?limit=20').then(x => x.json())
  ]);
  const sums = s.items || [];
  const reps = r.items || [];
  document.getElementById('lastSummary').textContent = sums.length ? sums[sums.length - 1].summary : 'Sin resumen';
  document.getElementById('lastReport').textContent = reps.length ? reps[reps.length - 1].report : 'Sin reporte';
  renderList(document.getElementById('sumList'), sums, 'summary');
  renderList(document.getElementById('repList'), reps, 'report');
}
async function generateReport(){
  const btn = document.getElementById('gen');
  btn.disabled = true;
  btn.textContent = 'Generando...';
  try {
    await fetch('/api/reports/generate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    await refresh();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generar reporte ahora';
  }
}
document.getElementById('gen').addEventListener('click', generateReport);
refresh().catch(function(){
  document.getElementById('lastSummary').textContent = 'No se pudo cargar';
  document.getElementById('lastReport').textContent = 'No se pudo cargar';
});
setInterval(() => refresh().catch(() => {}), 30000);
</script>
</body>
</html>
