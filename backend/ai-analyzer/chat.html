<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TARS Chat · Red WiFi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

/* ── Header igual al dashboard ── */
header{background:#1e293b;border-bottom:1px solid #334155;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:18px;font-weight:700;color:#f1f5f9}
header h1 span{color:#38bdf8}
.nav a{color:#94a3b8;text-decoration:none;font-size:13px;padding:6px 14px;border:1px solid #334155;border-radius:6px;margin-left:6px;transition:.2s}
.nav a:hover{background:#38bdf8;color:#0f172a;border-color:#38bdf8}
.nav a.active{background:#334155;color:#f1f5f9;border-color:#475569}

/* ── Layout ── */
.container{max-width:920px;margin:0 auto;padding:20px;display:flex;flex-direction:column;height:calc(100vh - 64px)}

/* ── Info bar ── */
.info-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.info-left{display:flex;align-items:center;gap:8px}
.badge{font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid #334155;color:#94a3b8}
.badge.groq{border-color:#7c3aed;color:#a78bfa;background:#1e1033}
.badge.llama{border-color:#0369a1;color:#38bdf8;background:#0c1a2e}
.badge.session{border-color:#334155;color:#64748b}
.btn-sm{font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;transition:.2s}
.btn-sm:hover{background:#334155;color:#f1f5f9}
.btn-sm.danger:hover{border-color:#ef4444;color:#ef4444;background:transparent}

/* ── Chat card ── */
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;flex:1;display:flex;flex-direction:column}
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}

/* ── Mensajes ── */
.msg{max-width:80%;padding:10px 14px;border-radius:12px;line-height:1.55;font-size:14px;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-bottom-left-radius:4px}
.msg.assistant.groq-msg{border-color:#7c3aed22;background:#1a1130}
.msg .meta{font-size:11px;margin-top:5px;opacity:.55;display:flex;align-items:center;gap:6px}
.msg.user .meta{justify-content:flex-end}
.provider-tag{font-size:10px;padding:1px 5px;border-radius:3px;background:#7c3aed33;color:#a78bfa}
.provider-tag.llama{background:#0369a133;color:#38bdf8}

/* ── Typing indicator ── */
.typing{align-self:flex-start;padding:10px 16px;background:#1e293b;border:1px solid #334155;border-radius:12px;border-bottom-left-radius:4px}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#64748b;margin:0 2px;animation:bounce .9s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* ── Input ── */
.input-row{display:flex;gap:8px;padding:12px;border-top:1px solid #334155;background:#0f172a}
.input-row input{flex:1;height:44px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;padding:0 14px;font-size:14px;outline:none;transition:.2s}
.input-row input:focus{border-color:#38bdf8}
.input-row input::placeholder{color:#475569}
.input-row button{height:44px;border:none;border-radius:10px;padding:0 18px;background:#2563eb;color:#fff;cursor:pointer;font-weight:600;font-size:14px;transition:.2s}
.input-row button:hover{background:#1d4ed8}
.input-row button:disabled{background:#334155;color:#64748b;cursor:not-allowed}
</style>
</head>
<body>

<header>
  <h1>TARS <span>Chat</span> · Red WiFi</h1>
  <nav class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/terminal">Terminal</a>
    <a href="/rulez">Reglas</a>
    <a href="/reports">Reportes</a>
    <a href="/chat" class="active">Chat IA</a>
  </nav>
</header>

<div class="container">

  <div class="info-bar">
    <div class="info-left">
      <span class="badge session" id="sessionBadge">session: nueva</span>
      <span class="badge" id="providerBadge">cargando…</span>
    </div>
    <div>
      <button class="btn-sm danger" id="btnClear" title="Borrar historial de esta sesión">Limpiar sesión</button>
    </div>
  </div>

  <div class="card">
    <div id="chat" class="chat"></div>
    <div class="input-row">
      <input id="q" type="text" placeholder="Pregunta algo sobre la red (ej. ¿hay algo raro? ¿qué dominios se ven?)">
      <button id="send">Enviar</button>
    </div>
  </div>

</div>

<script>
/* ── Estado ── */
let sessionId = localStorage.getItem('ai_chat_session_id') || '';
let provider   = 'unknown';

const chatEl       = document.getElementById('chat');
const qEl          = document.getElementById('q');
const sendBtn      = document.getElementById('send');
const sessionBadge = document.getElementById('sessionBadge');
const providerBadge= document.getElementById('providerBadge');

/* ── Helpers ── */
function fmtTime(ts){
  try { return new Date(ts).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); }
  catch(e){ return ''; }
}
function scrollBottom(){ chatEl.scrollTop = chatEl.scrollHeight; }

function setSession(id){
  sessionId = id || '';
  if (sessionId) localStorage.setItem('ai_chat_session_id', sessionId);
  sessionBadge.textContent = 'session: ' + (sessionId ? sessionId.slice(0,8)+'…' : 'nueva');
}

function setProvider(p){
  provider = p || 'unknown';
  if (p === 'groq'){
    providerBadge.className = 'badge groq';
    providerBadge.textContent = '⚡ Groq · Qwen';
  } else if (p === 'llama'){
    providerBadge.className = 'badge llama';
    providerBadge.textContent = '🦙 llama.cpp (local)';
  } else {
    providerBadge.className = 'badge';
    providerBadge.textContent = p || 'IA';
  }
}

/* ── Renderizar mensajes ── */
function push(role, text, ts, prov){
  const row  = document.createElement('div');
  const isUser = role === 'user';
  row.className = 'msg ' + (isUser ? 'user' : 'assistant') +
                  (!isUser && prov === 'groq' ? ' groq-msg' : '');
  row.textContent = text || '';

  const meta = document.createElement('div');
  meta.className = 'meta';

  if (!isUser && prov && prov !== 'unknown'){
    const tag = document.createElement('span');
    tag.className = 'provider-tag' + (prov === 'llama' ? ' llama' : '');
    tag.textContent = prov === 'groq' ? 'Groq' : 'local';
    meta.appendChild(tag);
  }

  const t = document.createElement('span');
  t.textContent = fmtTime(ts || new Date().toISOString());
  meta.appendChild(t);

  row.appendChild(meta);
  chatEl.appendChild(row);
  scrollBottom();
}

function showTyping(){
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typing-indicator';
  el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  chatEl.appendChild(el);
  scrollBottom();
  return el;
}
function removeTyping(){ document.getElementById('typing-indicator')?.remove(); }

/* ── Cargar historial ── */
async function loadHistory(){
  if (!sessionId) return;
  try {
    const r = await fetch('/api/chat/history?session_id=' + encodeURIComponent(sessionId) + '&limit=40');
    if (!r.ok) return;
    const j = await r.json();
    chatEl.innerHTML = '';
    (j.items || []).forEach(m => push(m.role, m.content, m.timestamp, m.provider));
  } catch(e) {}
}

/* ── Cargar info del proveedor desde /health ── */
async function loadProvider(){
  try {
    const r = await fetch('/health');
    if (!r.ok) return;
    const j = await r.json();
    setProvider(j.chat_provider || (j.groq_enabled ? 'groq' : 'llama'));
  } catch(e){ setProvider('llama'); }
}

/* ── Enviar mensaje ── */
async function send(){
  const q = qEl.value.trim();
  if (!q) return;
  qEl.value = '';
  push('user', q, new Date().toISOString());
  sendBtn.disabled = true;

  const typing = showTyping();
  try {
    const r = await fetch('/api/chat', {
      method : 'POST',
      headers: {'Content-Type':'application/json'},
      body   : JSON.stringify({ question: q, session_id: sessionId })
    });
    removeTyping();
    const j = await r.json();
    if (!r.ok || !j.ok){
      push('assistant', (j && j.error) ? j.error : 'No se pudo obtener respuesta.');
    } else {
      setSession(j.session_id);
      if (j.provider) setProvider(j.provider);
      push('assistant', j.answer, new Date().toISOString(), j.provider || provider);
    }
  } catch(e){
    removeTyping();
    push('assistant', 'Error de conexión con el servicio de IA.');
  } finally {
    sendBtn.disabled = false;
    qEl.focus();
  }
}

/* ── Limpiar sesión ── */
document.getElementById('btnClear').addEventListener('click', () => {
  if (!confirm('¿Borrar el historial de esta sesión?')) return;
  localStorage.removeItem('ai_chat_session_id');
  sessionId = '';
  chatEl.innerHTML = '';
  sessionBadge.textContent = 'session: nueva';
  push('assistant',
    'Sesión reiniciada. Puedo responder preguntas sobre el tráfico, alertas, dominios y dispositivos detectados en la red.',
    new Date().toISOString());
});

/* ── Eventos ── */
sendBtn.addEventListener('click', send);
qEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) send(); });

/* ── Init ── */
setSession(sessionId);
loadProvider();
loadHistory().then(() => {
  if (!sessionId){
    push('assistant',
      'Hola 👋 Soy TARS, tu analista de red. Puedo responder preguntas sobre tráfico, alertas, dominios y dispositivos detectados.\n\nEjemplos:\n· ¿Hay algo raro en la red?\n· ¿Qué dominios se han visto?\n· ¿Cuántos dispositivos están conectados?',
      new Date().toISOString());
  }
});
</script>
</body>
</html>
