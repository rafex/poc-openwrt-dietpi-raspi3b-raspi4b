<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Analyzer - Chat</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;max-width:980px;margin:24px auto;padding:0 12px;background:#0b1220;color:#e5e7eb}
    a{color:#93c5fd}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    textarea,input,button{font:inherit} textarea{width:100%;min-height:100px}
    pre{border:1px solid #1f2937;background:#111827;border-radius:8px;padding:10px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>AI Analyzer - Chat</h1>
  <div class="nav">
    <a href="/dashboard">dashboard</a><a href="/terminal">terminal</a><a href="/rulez">rulez</a><a href="/chat">chat</a><a href="/reports">reports</a>
  </div>
  <input id="session" placeholder="session_id (opcional)">
  <textarea id="q" placeholder="Pregunta"></textarea>
  <button id="send">Enviar</button>
  <pre id="out"></pre>
  <script>
    document.getElementById('send').onclick = async () => {
      const payload = {message: document.getElementById('q').value, session_id: document.getElementById('session').value || undefined};
      const res = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
      const json = await res.json();
      document.getElementById('out').textContent = JSON.stringify(json,null,2);
    };
  </script>
</body>
</html>
