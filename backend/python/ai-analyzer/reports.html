<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Analyzer - Reports</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;max-width:980px;margin:24px auto;padding:0 12px;background:#0b1220;color:#e5e7eb}
    a{color:#93c5fd}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    pre{border:1px solid #1f2937;background:#111827;border-radius:8px;padding:10px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>AI Analyzer - Reports</h1>
  <div class="nav">
    <a href="/dashboard">dashboard</a><a href="/terminal">terminal</a><a href="/rulez">rulez</a><a href="/chat">chat</a><a href="/reports">reports</a>
  </div>
  <h3>Summaries</h3><pre id="summaries">cargando...</pre>
  <h3>Reports</h3><pre id="reports">cargando...</pre>
  <script>
    Promise.all([
      fetch('/api/summaries?limit=10').then(r=>r.json()).catch(e=>({error:String(e)})),
      fetch('/api/reports?limit=10').then(r=>r.json()).catch(e=>({error:String(e)}))
    ]).then(([s,r])=>{
      document.getElementById('summaries').textContent = JSON.stringify(s,null,2);
      document.getElementById('reports').textContent = JSON.stringify(r,null,2);
    });
  </script>
</body>
</html>
